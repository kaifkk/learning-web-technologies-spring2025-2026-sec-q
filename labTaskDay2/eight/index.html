<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>labTask</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <table>
            <tr>
                <td colspan="2">
                    PERSON PROFILE
                </td>
                <td></td>
            </tr>
            <tr>
                <td>
                    name
                </td>
                <td>
                    <input id="nameInput" type="text" name="name" value="" />
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Email</td>
                <td>
                    <input id="emailInput" type="email" name="email" value="" />
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" value="Male" />Male
                    <input type="radio" name="gender" value="Female" />Female
                    <input type="radio" name="gender" value="Other" />Other
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td>
                    <input id="dateInput" class="dobInputField" type="number" value="" /> / <input id="monthInput" class="dobInputField" type="number" value="" /> / <input id="yearInput" class="dobInputField year" type="number" value="" /> (dd/mm/yyyy)
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Blood Group</td>
                <td>
                    <select name="bloodGroup">
                        <option value="">#</option>
                        <option value="A+">A+</option>
                        <option value="B+">B+</option>
                        <option value="AB+">AB+</option>
                    <select>
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Degree</td>
                <td>
                    <input type="checkbox" name="degree" value="SSC" /> SSC
                    <input type="checkbox" name="degree" value="HSC" /> HSC
                    <input type="checkbox" name="degree" value="BSc" /> BSc
                    <input type="checkbox" name="degree" value="Msc" /> MSc
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Photo</td>
                <td colspan="2">
                    <input id="file" type="file" name="image" value=""  />
                </td>
            </tr>
            <tr>
                <td id="emptyTD" colspan="3"></td>
            </tr>
            <tr>
                <td id="buttonTD" colspan="3">
                    <input id="submitBtn" type="button" name="submit" value="Submit" />
                    <input type="reset" name="reset" value="Reset" />
                </td>
            </tr>
        </table>
    </form>

    <script src="script.js"></script>
</body>
</html>
