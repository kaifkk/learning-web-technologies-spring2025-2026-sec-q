<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>labTask</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Profile Picture</legend>
            <table>
                <tr>
                    <td>User Id</td>
                    <td>
                        <input id="userId" type="number" name="userId" value="" />
                    </td>
                </tr>
                <tr>
                    <td>Picture</td>
                    <td>
                        <input id="file" type="file" name="image" value="" />
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <hr />
                    </td>
                </tr>
                <tr>
                    <td>
                        <input id="submitBtn" type="button" name="submitBtn" value="Submit" />
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>

    <script src="script.js"></script>
</body>
</html>
